name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Compile check (syntax)
        run: python -m compileall app

      - name: Run test suite
        env:
          # CI runs with no real provider keys — tests cover everything that
          # doesn't require a live LLM (auth, credits, webhook security, audit,
          # gating, renderers, extraction). Generation success needs real keys.
          LOG_LEVEL: WARNING
        run: pytest -q

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type/compile + bundle)
        run: npm run build

      - name: Check build output exists
        run: test -f dist/index.html && echo "build ok"

  all-green:
    name: CI passed
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All checks passed."
